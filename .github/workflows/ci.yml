name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pixi-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pixi
        run: curl -fsSL https://pixi.sh/install.sh | bash

      - name: Add Pixi to PATH
        run: echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Run local CI task
        run: pixi run ci
