sample_id: HG002
chromosome: chr20
region: chr20:1-5000000

inputs:
  target_vcf: data/derived/hg002_chr20.vcf.gz
  target_reads: data/derived/hg002_chr20_reads.refaware_v3_superreads.json
  target_variants: data/derived/hg002_chr20_variants.real.json
  target_site_priors: data/derived/hg002_chr20_site_priors_ancestry_on.json
  target_block_summaries: null
  panel_path: data/derived/panel_chr20.bin
  truth_vcf: data/truth/hg002_chr20_truth.vcf.gz

ancestry:
  groups: [afr, amr, eas, eur, sas, mid, oce]
  weights: [0.02, 0.03, 0.02, 0.88, 0.02, 0.02, 0.01]

candidate_engine:
  top_k_donors: 32
  max_composite_states: 16

decoder:
  window_size: 50000
  overlap_size: 5000
  lambda_panel: 1.0
  lambda_anc: 0.5
  lambda_switch: 0.2

bridge:
  min_informative_sites: 2
  min_confidence: 0.2
  max_gap_bp: 100000
